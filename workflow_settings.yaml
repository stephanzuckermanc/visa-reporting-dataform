defaultProject: visa-reporting
defaultLocation: us-central1
# defaultDataset is mostly a fallback; per-region models override it via config.schema.
defaultDataset: 022_visa_latam_dt
defaultAssertionDataset: visa_assertions
dataformCoreVersion: 3.0.0
# NOTE: Do NOT add `vars` here unless something actually reads them.
# Dataform Core 3.x restricts `vars` to scalar string -> string mappings. A list
# value (e.g. `regions: [namer, latam, emea]`) fails compilation with
# "Array must have size 1, but has size 3". The region list used by the dl/dt/dm
# forEach loops lives hardcoded in `includes/country_to_region.js::REGIONS`.
